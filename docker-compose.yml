version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apna_transport
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apna_transport"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/apna_transport?schema=public
      - DIRECT_URL=postgresql://postgres:password@db:5432/apna_transport?schema=public
      - AUTH_SECRET=some-random-secret-for-nextauth
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
